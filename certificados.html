<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificados | Instituto Técnico Élite</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial;
}

body{
background:#f3f5f8;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
background:white;
padding:40px;
border-radius:10px;
width:100%;
max-width:400px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2{
color:#1f3565;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
background:#1f3565;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#15284e;
}

#resultado{
margin-top:20px;
}

</style>

</head>

<body>

<div class="card">

<h2>Descargar Certificado</h2>

<input type="text" id="cedula" placeholder="Ingrese su cédula">

<button onclick="buscar()">Consultar</button>

<div id="resultado"></div>

</div>

<script>

const URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQXx5WMtDLiNSahFtRXm7diaQ3Ewa7sDhjr05S-HvdNwDwF95w8zurlArj_Z0rkLNRs1uRyUb9WqKmE/pub?gid=0&single=true&output=csv";

async function buscar(){

let cedula=document.getElementById("cedula").value.trim();

if(cedula===""){
document.getElementById("resultado").innerHTML="Ingrese su cédula";
return;
}

document.getElementById("resultado").innerHTML="Consultando...";

const res=await fetch(URL);
const data=await res.text();

const filas=data.split("\n");

for(let i=1;i<filas.length;i++){

let col=filas[i].split(",");

if(col[0]==cedula){

document.getElementById("resultado").innerHTML=
"<p><b>Cordial saludo "+col[1]+"</b></p>"+
"<br>"+
"<a href='"+col[3]+"' target='_blank'><button>Descargar certificado</button></a>";

return;

}

}

document.getElementById("resultado").innerHTML="No se encontró certificado";

}

</script>

</body>
</html>
